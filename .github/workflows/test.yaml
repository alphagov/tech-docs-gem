name: Test

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read          # Allows the action to check out your repository code
  pull-requests: write    # Allows the action to comment on or update the Dependabot PR
  statuses: write         # Allows the action to post pass/fail build statuses

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        ruby: ['3.3', '3.4', '4.0']

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          show-progress: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - uses: ruby/setup-ruby@89f90524b88a01fe6e0b732220432cc6142926af # v1.313.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Lint Ruby and javascript files
        run: bundle exec rake lint

      - name: Run Ruby unit tests
        run: bundle exec rake spec

      - name: Run Javascript tests
        run: bundle exec rake jasmine:ci
