name: Test

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
  workflow_dispatch:

permissions:
  contents: read          # Allows the action to check out your repository code
  pull-requests: write    # Allows the action to comment on or update the Dependabot PR
  statuses: write         # Allows the action to post pass/fail build statuses

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        ruby: ['3.3', '3.4', '4.0']

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          show-progress: false

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - uses: ruby/setup-ruby@9eb537ca036ebaed86729dcb9309076e4c5c3b74 # v1.314.0
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true

      - name: Lint Ruby and javascript files
        run: bundle exec rake lint

      - name: Run Ruby unit tests
        run: bundle exec rake spec

      - name: Run Javascript tests
        run: bundle exec rake jasmine:ci
